{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Teacher Login</h5>
                    <p class="card-text">Already registered? Login here</p>
                    <a href="{% url 'teacher_login' %}" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">New Teacher Registration</h5>
                    <p class="card-text">New teacher? Register here</p>
                    <a href="{% url 'teacher_register' %}" class="btn btn-success">Register</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
