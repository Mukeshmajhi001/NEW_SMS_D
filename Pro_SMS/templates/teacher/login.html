{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    .login-container {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
    }
    
    .login-container::before {
        content: '';
        position: absolute;
        width: 2000px;
        height: 2000px;
        border-radius: 50%;
        background: linear-gradient(140deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        top: -1000px;
        right: -500px;
        transform: rotate(45deg);
        pointer-events: none;
    }
    
    .login-container::after {
        content: '';
        position: absolute;
        width: 1000px;
        height: 1000px;
        border-radius: 50%;
        background: linear-gradient(225deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
        bottom: -400px;
        left: -200px;
        pointer-events: none;
    }
    
    .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .card-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 30px 30px 0 0 !important;
        padding: 2rem 2rem 1.5rem 2rem;
        text-align: center;
        border: none;
    }
    
    .card-header h3 {
        color: white;
        font-weight: 600;
        font-size: 2rem;
        margin: 0;
        letter-spacing: -0.5px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }
    
    .card-header i {
        font-size: 3rem;
        color: white;
        margin-bottom: 0.5rem;
        display: block;
    }
    
    .card-body {
        padding: 2.5rem 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }
    
    .form-label {
        font-weight: 500;
        color: #333;
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.95rem;
        letter-spacing: 0.3px;
    }
    
    .input-group {
        position: relative;
        display: flex;
        align-items: center;
    }
    
    .input-icon {
        position: absolute;
        left: 15px;
        color: #667eea;
        z-index: 2;
        font-size: 1.1rem;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 2px solid #e1e5e9;
        border-radius: 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: white;
    }
    
    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        outline: none;
    }
    
    .form-control::placeholder {
        color: #a0aec0;
        font-size: 0.95rem;
    }
    
    .password-toggle {
        position: absolute;
        right: 15px;
        background: none;
        border: none;
        color: #718096;
        cursor: pointer;
        font-size: 1.1rem;
        z-index: 2;
    }
    
    .password-toggle:hover {
        color: #667eea;
    }
    
    .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 15px;
        padding: 14px 20px;
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.5px;
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s ease;
    }
    
    .btn-login:hover::before {
        left: 100%;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }
    
    .btn-login:active {
        transform: translateY(0);
    }
    
    .register-link {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 2px solid #edf2f7;
    }
    
    .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .register-link a:hover {
        color: #764ba2;
        transform: translateX(5px);
    }
    
    .register-link a i {
        font-size: 1.1rem;
    }
    
    .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 0;
    }
    
    .shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: float 6s infinite;
    }
    
    .shape-1 {
        width: 100px;
        height: 100px;
        top: 10%;
        left: 10%;
        animation-delay: 0s;
    }
    
    .shape-2 {
        width: 150px;
        height: 150px;
        bottom: 15%;
        right: 10%;
        animation-delay: 2s;
    }
    
    .shape-3 {
        width: 70px;
        height: 70px;
        top: 30%;
        right: 20%;
        animation-delay: 1s;
    }
    
    @keyframes float {
        0%, 100% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-20px) rotate(10deg);
        }
    }
    
    /* Responsive adjustments */
    @media (max-width: 480px) {
        .login-container {
            padding: 1rem;
        }
        
        .card-header h3 {
            font-size: 1.5rem;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .form-control {
            padding: 10px 15px 10px 40px;
        }
    }
</style>

<!-- Font Awesome for icons (make sure to include in base.html) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="login-container">
    <!-- Animated background shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="login-card">
        <div class="card-header">
            <i class="fas fa-chalkboard-teacher"></i>
            <h3>Welcome Back!</h3>
            <p style="color: rgba(255,255,255,0.9); margin: 0.5rem 0 0 0;">Sign in to continue your journey</p>
        </div>
        
        <div class="card-body">
            <form method="POST" id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="phone">
                        <i class="fas fa-phone-alt" style="margin-right: 8px; color: #667eea;"></i>
                        Phone Number
                    </label>
                    <div class="input-group">
                        <i class="fas fa-mobile-alt input-icon"></i>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               placeholder="+1 234 567 8900" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock" style="margin-right: 8px; color: #667eea;"></i>
                        Password
                    </label>
                    <div class="input-group">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Sign In
                </button>
            </form>
            
            <div class="register-link">
                <a href="{% url 'teacher_register' %}">
                    <i class="fas fa-user-plus"></i>
                    New teacher? Create an account
                </a>
            </div>
            
            <!-- Optional: Add a forgot password link -->
            <div style="text-align: center; margin-top: 1rem;">
                <a href="#" style="color: #718096; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-question-circle"></i> Forgot password?
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Password visibility toggle
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
    
    // Optional: Add smooth form submission feedback
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const submitBtn = this.querySelector('.btn-login');
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        submitBtn.disabled = true;
    });
</script>
{% endblock %}
